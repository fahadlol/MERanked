enabled: true

ranges:
  - min-seconds: 0
    max-seconds: 30
    rating-range: 100
  - min-seconds: 30
    max-seconds: 60
    rating-range: 200
  - min-seconds: 60
    max-seconds: 90
    rating-range: 300
  - min-seconds: 90
    max-seconds: 9999
    rating-range: 400

prefer:
  similar-confidence: true
  # Soft rating penalty added when opponent confidence labels differ (higher = stronger preference).
  confidence-weight: 150.0
  different-recent-opponent: true
  different-ip: true

# Pick the candidate pair with highest predicted match quality (not just closest rating).
quality-maximizing:
  enabled: true
  min-quality-percent: 40

region:
  enabled: true
  prefer-same-region: true
  max-cross-region-ping: 150
  relax-after-seconds: 45
  hard-ping-cap: 250

tick-interval-ms: 500

# Seconds before the same two players can be matched again (prevents instant rematches).
rematch-cooldown-seconds: 30
