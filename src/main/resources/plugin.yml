name: MERanked
version: ${version}
main: com.meranked.MERankedPlugin
api-version: '1.21'
authors: [MERanked]
description: Middle East Elo/Glicko queue-based tierlist system - Gold Rift
softdepend: [PlaceholderAPI, FastAsyncWorldEdit, WorldEdit]
commands:
  ranked:
    description: Main ranked command
    aliases: [r]
  queue:
    description: Queue for ranked
  arena:
    description: Arena management
    permission: meranked.arena.admin
  kiteditor:
    description: Open kit editor
    aliases: [editkit, kit]
  region:
    description: Set region tag
  spectate:
    description: Spectate a match
    aliases: [spec]
  staffspectate:
    description: Staff silent spectate
    aliases: [sspec]
  replay:
    description: View match replay
  spawn:
    description: Teleport to spawn
  setspawn:
    description: Set spawn location
    permission: meranked.admin.setspawn
  hub:
    description: Teleport to hub
    aliases: [lobby]
  ping:
    description: Check ping
  msg:
    description: Private message
    aliases: [tell, w, whisper]
  reply:
    description: Reply to last message
  msgtoggle:
    description: Toggle private messages
  socialspy:
    description: Spy on messages
    permission: meranked.staff.socialspy
  discord:
    description: Show discord link
  rules:
    description: Show rules
  help:
    description: Show help
  matches:
    description: List live matches
  unspectate:
    description: Stop spectating
  spectateaccept:
    description: Accept spectate request
  spectatedeny:
    description: Deny spectate request
  spectatetoggle:
    description: Toggle spectate requests
    aliases: [spectoggle]
  settings:
    description: Player settings
  punish:
    description: Open punishment GUI
    permission: meranked.punish
  history:
    description: View punishment history
    permission: meranked.history
  unpunish:
    description: Revoke a punishment
    permission: meranked.unpunish
  bridge:
    description: Discord bridge management
    permission: meranked.bridge.status
  staffduty:
    description: Toggle staff duty
    aliases: [duty, stafflogin]
    permission: meranked.staff.duty
  staffstatus:
    description: Staff and bridge status
    permission: meranked.staff.status
  staffpanel:
    description: Open staff panel GUI
    permission: meranked.staff.panel
  report:
    description: Report a player
    permission: meranked.report.use
  reports:
    description: List open reports
    permission: meranked.report.review
  reportreview:
    description: Review a report
    permission: meranked.report.review
  reportvalid:
    description: Mark report valid
    permission: meranked.report.review
  reportinvalid:
    description: Mark report invalid
    permission: meranked.report.review
  lookup:
    description: Staff player lookup
    permission: meranked.staff.lookup
  staffnote:
    description: Add staff note
    permission: meranked.staff.note
permissions:
  meranked.*:
    description: All MERanked permissions
    default: op
    children:
      meranked.admin: true
      meranked.staff: true
      meranked.arena.admin: true
      meranked.kit.audit: true
      meranked.kit.view: true
      meranked.kit.reset: true
  meranked.admin:
    description: Admin commands
    default: op
  meranked.staff:
    description: Staff commands
    default: op
  meranked.arena.admin:
    description: Arena management
    default: op
  meranked.kit.audit:
    description: Audit kits
    default: op
  meranked.kit.view:
    description: View player kits
    default: op
  meranked.kit.reset:
    description: Reset player kits
    default: op
  meranked.staff.socialspy:
    description: Social spy
    default: op
  meranked.staff.spectate:
    description: Staff spectate
    default: op
  meranked.bypass.dodge:
    description: Bypass dodge penalties
    default: op
  meranked.bypass.queue:
    description: Bypass queue restrictions
    default: op
  meranked.staff.center:
    description: Access the staff command center
    default: op
  meranked.punish:
    description: Use the punishment system
    default: op
  meranked.punish.ban:
    description: Issue bans
    default: op
  meranked.punish.mute:
    description: Issue mutes
    default: op
  meranked.punish.kick:
    description: Issue kicks
    default: op
  meranked.punish.rankedban:
    description: Issue ranked bans
    default: op
  meranked.unpunish:
    description: Revoke punishments
    default: op
  meranked.history:
    description: View punishment history
    default: op
  meranked.bridge.status:
    description: View bridge status
    default: op
  meranked.bridge.reload:
    description: Reload bridge config
    default: op
  meranked.bridge.test:
    description: Send test bridge log
    default: op
  meranked.staff.duty:
    description: Toggle staff duty
    default: op
  meranked.staff.status:
    description: View staff status
    default: op
  meranked.staff.panel:
    description: Open staff panel
    default: op
  meranked.staff.lookup:
    description: Player lookup
    default: op
  meranked.staff.note:
    description: Add staff notes
    default: op
  meranked.report.use:
    description: Submit reports
    default: true
  meranked.report.review:
    description: Review reports
    default: op
  meranked.punish.blacklist:
    description: Issue blacklists
    default: op
  meranked.punish.remove:
    description: Remove punishments
    default: op
  meranked.punish.history:
    description: View punishment history
    default: op
  meranked.punish.exempt:
    description: Exempt from punishments
    default: op
