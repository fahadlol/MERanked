arena-preview:
  enabled: true
  # spawn a floating TextDisplay hologram near the player showing the arena info
  hologram: true
  chat-preview: true
  format: "<gold><bold><arena></bold></gold>\n<gray><tags></gray>\n<gray><description></gray>"
