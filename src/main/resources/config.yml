# MERanked - Gold Rift Theme
# Middle East competitive ranked core

prefix: "<gradient:#D6B36A:#7C3AED><bold>MERanked</bold></gradient> <dark_gray>»</dark_gray>"

debug: false

spawn:
  world: world
  x: 0.5
  y: 100.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

kit-editor-spawn:
  world: world
  x: 100.5
  y: 100.0
  z: 100.5
  yaw: 180.0
  pitch: 0.0

season:
  auto-start: true
  current-season-id: 1

rank-protection:
  enabled: true
  matches-after-promotion: 2
  protect-from-demotion-only: true
  decrease-on-loss: true
  decrease-on-match: false

placement:
  matches-required: 7
  max-tier: LT3
  hide-rating: true
  hide-estimated-tier: true

decay:
  enabled: true
  inactive-days: 14
  rd-increase-per-day: 2.0
  max-rd-increase: 50.0

match:
  min-duration-seconds: 30
  countdown-seconds: 3
  post-match-delay-seconds: 5
  block-commands: true
  allowed-commands:
    - msg
    - r
    - reply
    - ping

rating-spike-detection:
  enabled: true
  max-rating-gain-per-hour: 180
  max-rating-gain-per-day: 350
  ignore-placements: true

discord-link: "https://discord.gg/meranked"
rules-link: "https://meranked.gg/rules"

discord-bridge:
  enabled: true
  mode: "websocket"
  websocket-url: "ws://127.0.0.1:8081/minecraft"
  http-url: "http://127.0.0.1:3000/api/minecraft/event"
  secret-token: "CHANGE_ME"
  server-id: "meranked-main"
  reconnect-delay-seconds: 5
  heartbeat-seconds: 30
  queue-offline-events: true
  max-queued-events: 500
  inbound-port: 8082
  inbound-path: "/bridge"
  debug: false

logs:
  staff: true
  queue: true
  match: true
  suspicion: true
  report: true
  system: true
  arena: true
  punishment: true
  discord: true

staff-duty:
  enabled: true
  auto-duty-on-minecraft-join: false
  require-discord-login-for-ticket-routing: true
  max-active-tickets-per-staff: 3

reports:
  enabled: true
  cooldown-seconds: 120
  min-reason-length: 5
  block-self-report: true

performance-logs:
  enabled: true
  tps-warning: 17.0
  memory-warning-percent: 85
  cooldown-seconds: 300

command-logging:
  enabled: true
  staff-commands-only: true
  ignored-commands:
    - "msg"
    - "r"
    - "tell"
    - "login"
    - "register"
  dangerous-commands:
    - "ban"
    - "mute"
    - "kick"
    - "warn"
    - "unban"
    - "unmute"
    - "op"
    - "deop"
    - "lp"
    - "luckperms"
    - "gamemode"
    - "tp"
    - "teleport"
    - "vanish"
    - "freeze"
