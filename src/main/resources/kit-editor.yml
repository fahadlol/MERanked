enabled: true

# Lobby hotbar items are configured in lobby-items.yml
  enabled: true
  allow-trim-materials:
    - diamond
    - emerald
    - gold
    - netherite
    - amethyst
  allow-trim-patterns:
    - silence
    - ward
    - vex
    - tide
    - sentry

controls:
  use-item-display: true
  use-text-display: true
  use-interaction: true
  npc-fallback: true

illegal-items:
  - BEDROCK
  - BARRIER
  - COMMAND_BLOCK
  - STRUCTURE_VOID
  - JIGSAW
  - LIGHT

max-items-per-slot: 64
allow-shulker-editing: true
allow-ender-chest-editing: true
